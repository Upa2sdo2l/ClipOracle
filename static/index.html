<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ClipOracle — Категории</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- Шапка -->
    <header class="header">
      <img src="logo.png" alt="ClipOracle Logo" class="logo" />

      <!-- Выпадающее меню навигации -->
      <div class="nav-dropdown">
        <button class="nav-tab active" id="nav-categories" data-i18n="categories">Категории ▼</button>
        <div class="nav-menu">
          <!-- Загрузится через JS -->
        </div>
      </div>

      <a href="favorites.html" class="nav-tab" id="favorites-tab" data-i18n="favorites">Избранное</a>

      <div class="lang-switcher">
        <span class="lang-label">RU</span>
        <label class="lang-toggle">
          <input type="checkbox" id="lang-checkbox">
          <span class="lang-slider"></span>
        </label>
        <span class="lang-label">EN</span>
      </div>

      <!-- Поиск (скрывается на мобильных) -->
      <div class="search-box">
        <input type="text" placeholder="Search" id="search-input" data-i18n-placeholder="search_placeholder" />
        <button><img src="Icons/Magnifier.svg" class="icon" alt="search"></button>
      </div>
    </header>



    <!-- Основной контент -->
    <main class="main-content">
      <div class="content-section">
        <!-- Левая колонка: фильтры -->
        <aside class="filters">
          <div class="filter-dropdown">
            <button class="filter-toggle" data-i18n="filters">Фильтры</button>
            <div class="filter-menu">
              <div class="filter-group">
                <label data-i18n="views">Просмотры</label>
                <div class="range-inputs">
                  <input type="number" id="min-views" placeholder="Мин" min="0" data-i18n-placeholder="min" />
                  <span>—</span>
                  <input type="number" id="max-views" placeholder="Макс" min="0" data-i18n-placeholder="max" />
                </div>
              </div>

              <div class="filter-group">
                <label data-i18n="likes">Лайки</label>
                <div class="range-inputs">
                  <input type="number" id="min-likes" placeholder="Мин" min="0" data-i18n-placeholder="min" />
                  <span>—</span>
                  <input type="number" id="max-likes" placeholder="Макс" min="0" data-i18n-placeholder="max" />
                </div>
              </div>

              <div class="filter-group">
                <label data-i18n="comments">Комментарии</label>
                <div class="range-inputs">
                  <input type="number" id="min-comments" placeholder="Мин" min="0" data-i18n-placeholder="min" />
                  <span>—</span>
                  <input type="number" id="max-comments" placeholder="Макс" min="0" data-i18n-placeholder="max" />
                </div>
              </div>

              <div class="filter-group">
                <label data-i18n="shares">Репосты</label>
                <div class="range-inputs">
                  <input type="number" id="min-shares" placeholder="Мин" min="0" data-i18n-placeholder="min" />
                  <span>—</span>
                  <input type="number" id="max-shares" placeholder="Макс" min="0" data-i18n-placeholder="max" />
                </div>
              </div>

              <button id="apply-filters" class="apply-btn" data-i18n="apply">Применить</button>
            </div>
          </div>
        </aside>

        <!-- Центр: видео -->
        <section class="video-container">
          <div class="video-placeholder">
            <video controls class="video-player" poster="https://via.placeholder.com/200x355/1e1e1e/ffffff?text=Loading...">
              <source src="" type="video/mp4">
              Ваш браузер не поддерживает видео.
            </video>
          </div>
          <div class="video-nav">
            <button class="nav-arrow" id="prev-video">◀</button>
            <button class="nav-arrow" id="next-video">▶</button>
          </div>
        </section>

        <!-- Правая колонка: блоки информации -->
        <section class="charts-container">
          <div class="chart-card">
            <div class="chart-header">
              <h4 data-i18n="views_header">ПРОСМОТРЫ</h4>
              <span class="more" data-i18n="more">more</span>
            </div>
            <div class="chart-area">
              <img src="https://via.placeholder.com/300x150?text=График+Просмотров" alt="Views Chart" />
              <div class="chart-labels">
                <span>2дек</span>
                <span>7дек</span>
              </div>
            </div>
          </div>

          <div class="chart-card">
            <div class="chart-header">
              <h4 data-i18n="info_header">ОСНОВНАЯ ИНФОРМАЦИЯ</h4>
              <span class="more" data-i18n="more">more</span>
            </div>
            <div class="info-stats">
              <div><img src="Icons/BaselineRemoveRedEye.svg" class="icon" alt="views"> <span id="views">0</span></div>
              <div><img src="Icons/InterfaceUserSingleCloseGeometricHumanPersonSingleUpUser.svg" class="icon" alt="likes"> <span id="likes">0</span></div>
              <div><img src="Icons/Like.svg" class="icon" alt="comments"> <span id="comments">0</span></div>
              <div><img src="Icons/Repost.svg" class="icon" alt="shares"> <span id="shares">0</span></div>
            </div>
            <!-- Кнопка "Добавить в избранное" -->
            <div style="margin-top: 12px; text-align: center;">
              <button id="add-to-favorites" class="favorite-btn" data-i18n="add_fav"><img src="Icons/Like_not_active.svg" class="icon" id="fav-icon" alt="like"> Добавить в избранное</button>
            </div>
          </div>
        </section>
      </div>
    </main>

    <footer class="footer">
      <span>(C) CLIPORACLE 2025</span>
      <span>cliporacle@gmail.com</span>
    </footer>
  </div>

  <script>
    let currentCategoryId = null;

    function toggleMobileSearch() {
      const container = document.getElementById('mobileSearchContainer');
      container.classList.toggle('active');
      if (container.classList.contains('active')) {
        container.querySelector('input').focus();
      }
    }

    // Загрузка категорий
    async function loadCategories() {
      const res = await fetch('/api/categories');
      const categories = await res.json();
      const menu = document.querySelector('.nav-menu');
      menu.innerHTML = '';
      categories.forEach(cat => {
        const a = document.createElement('a');
        a.href = '#';
        a.textContent = cat.name;
        a.addEventListener('click', (e) => {
          e.preventDefault();
          currentCategoryId = cat.id;
          loadRandomVideo();
          document.getElementById('nav-categories').textContent = cat.name + ' ▼';
        });
        menu.appendChild(a);
      });
    }

    // Глобальный список видео для навигации
    let videoList = [];
    let currentVideoIndex = 0;

    // Загрузка случайного видео
    async function loadRandomVideo() {
      let url = '/api/videos';
      const params = new URLSearchParams();

      if (currentCategoryId !== null) {
        params.append('category_id', currentCategoryId);
      }
      // ... (собираем параметры фильтров как раньше)
      const minViews = document.getElementById('min-views').value;
      const maxViews = document.getElementById('max-views').value;
      const minLikes = document.getElementById('min-likes').value;
      const maxLikes = document.getElementById('max-likes').value;
      const minComments = document.getElementById('min-comments').value;
      const maxComments = document.getElementById('max-comments').value;
      const minShares = document.getElementById('min-shares').value;
      const maxShares = document.getElementById('max-shares').value;

      if (minViews) params.append('min_views', minViews);
      if (maxViews) params.append('max_views', maxViews);
      if (minLikes) params.append('min_likes', minLikes);
      if (maxLikes) params.append('max_likes', maxLikes);
      if (minComments) params.append('min_comments', minComments);
      if (maxComments) params.append('max_comments', maxComments);
      if (minShares) params.append('min_shares', minShares);
      if (maxShares) params.append('max_shares', maxShares);

      if (params.toString()) {
        url += '?' + params.toString();
      }

      const res = await fetch(url);
      const videos = await res.json();
      
      videoList = videos;
      currentVideoIndex = 0;

      if (videoList.length === 0) {
        alert('Видео по заданным фильтрам не найдено.');
        // ... (сброс плеера)
        document.querySelector('.video-player').src = '';
        document.getElementById('views').textContent = '0';
        document.getElementById('likes').textContent = '0';
        document.getElementById('comments').textContent = '0';
        document.getElementById('shares').textContent = '0';
        window.currentVideo = null;
        return;
      }
      
      displayVideo(videoList[currentVideoIndex]);
    }

    function displayVideo(video) {
      const videoPlayer = document.querySelector('.video-player');
      if (videoPlayer && video.file_path) {
        const fileName = video.file_path.split('/').pop();
        const videoUrl = `/data/videos/${fileName}`;
        videoPlayer.src = videoUrl;
        videoPlayer.load();
      }

      document.getElementById('views').textContent = video.views || '0';
      document.getElementById('likes').textContent = video.likes || '0';
      document.getElementById('comments').textContent = video.comments || '0';
      document.getElementById('shares').textContent = video.shares || '0';

      window.currentVideo = video;

      // Проверяем, находится ли текущее видео в избранном, и обновляем иконку
      const favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
      const isFavorite = favorites.some(fav => fav.id === video.id);
      const favIcon = document.getElementById('fav-icon');
      if (favIcon) {
        favIcon.src = isFavorite ? 'Icons/Like.svg' : 'Icons/Like_not_active.svg';
      }
    }



    // Добавить в избранное
    document.getElementById('add-to-favorites').addEventListener('click', () => {
      if (!window.currentVideo) {
        alert('Нет видео для добавления');
        return;
      }

      let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');

      const exists = favorites.some(fav => fav.id === window.currentVideo.id);
      if (exists) {
        alert('Видео уже в избранном!');
        return;
      }

      favorites.push({
        id: window.currentVideo.id,
        title: window.currentVideo.genre_name || 'Без названия',
        views: window.currentVideo.views || 0,
        likes: window.currentVideo.likes || 0,
        comments: window.currentVideo.comments || 0,
        shares: window.currentVideo.shares || 0,
        file_path: window.currentVideo.file_path || ''
      });

      localStorage.setItem('favorites', JSON.stringify(favorites));
      
      // Плавная смена иконки
      const favIcon = document.getElementById('fav-icon');
      favIcon.classList.add('icon-fade');
      
      setTimeout(() => {
        favIcon.src = 'Icons/Like.svg';
        favIcon.classList.remove('icon-fade');
      }, 200);

      alert('Видео добавлено в избранное!');
    });

    // Инициализация
    document.addEventListener('DOMContentLoaded', () => {
      loadCategories();
      loadRandomVideo(); // Первое случайное видео

      // Переключение языка
      const langCheckbox = document.getElementById('lang-checkbox');
      const translations = {
        ru: {
          categories: 'Категории ▼',
          favorites: 'Избранное',
          search_placeholder: 'Поиск',
          filters: 'Фильтры',
          views: 'Просмотры',
          likes: 'Лайки',
          comments: 'Комментарии',
          shares: 'Репосты',
          min: 'Мин',
          max: 'Макс',
          apply: 'Применить',
          views_header: 'ПРОСМОТРЫ',
          info_header: 'ОСНОВНАЯ ИНФОРМАЦИЯ',
          more: 'ещё',
          add_fav: 'Добавить в избранное'
        },
        en: {
          categories: 'Categories ▼',
          favorites: 'Favorites',
          search_placeholder: 'Search',
          filters: 'Filters',
          views: 'Views',
          likes: 'Likes',
          comments: 'Comments',
          shares: 'Shares',
          min: 'Min',
          max: 'Max',
          apply: 'Apply',
          views_header: 'VIEWS',
          info_header: 'BASIC INFO',
          more: 'more',
          add_fav: 'Add to favorites'
        }
      };

      function updateLanguage(lang) {
        document.querySelectorAll('[data-i18n]').forEach(el => {
          const key = el.getAttribute('data-i18n');
          el.textContent = translations[lang][key];
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
          const key = el.getAttribute('data-i18n-placeholder');
          el.placeholder = translations[lang][key];
        });
      }

      langCheckbox.addEventListener('change', () => {
        const lang = langCheckbox.checked ? 'en' : 'ru';
        updateLanguage(lang);
      });

      document.getElementById('nav-categories').addEventListener('click', function(e) {
        e.stopPropagation();
        const menu = this.nextElementSibling;
        menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
      });

      document.getElementById('favorites-tab').addEventListener('click', (e) => {
        e.preventDefault();
        window.location.href = 'favorites.html';
      });

      document.addEventListener('click', function(e) {
        if (!e.target.closest('.nav-dropdown')) {
          document.querySelector('.nav-menu').style.display = 'none';
        }
      });

      // Фильтры — выпадающее меню
      document.querySelector('.filter-toggle').addEventListener('click', function(e) {
        e.stopPropagation();
        const menu = this.nextElementSibling;
        menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
      });

      // Навигация видео
      document.getElementById('prev-video').addEventListener('click', () => {
        // Если API отдает только одно видео, листание назад по списку невозможно.
        // Можно реализовать историю просмотренных видео, если нужно.
        alert('Функция листания назад доступна при загрузке списка.');
      });

      document.getElementById('next-video').addEventListener('click', () => {
        // Загружаем новое случайное видео при клике "вперед"
        loadRandomVideo();
      });

      // Применить фильтры
      document.getElementById('apply-filters').addEventListener('click', () => {
        loadRandomVideo();
      });
    });
  </script>
</body>
</html>
